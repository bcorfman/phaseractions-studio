groups:
  g-enemies:
    id: g-enemies
    name: Enemy Formation
    members: [e1, e2, e3, e4, e5, e6, e7, e8, e9, e10, e11, e12, e13, e14, e15]
    layout:
      type: grid
      rows: 3
      cols: 5
      startX: 220
      startY: 140
      spacingX: 48
      spacingY: 40
behaviors:
  b-formation:
    id: b-formation
    name: Formation Patrol
    target: { type: group, groupId: g-enemies }
    rootActionId: a-root
actions:
  a-root: { id: a-root, type: Repeat, name: Loop, childId: a-seq }
  a-seq:
    id: a-seq
    type: Sequence
    name: Sweep + Drop
    children: [a-move-right, a-drop-right, a-wait-right, a-move-left, a-drop-left, a-wait-left]
  a-move-right:
    id: a-move-right
    type: MoveUntil
    name: Move Right
    target: { type: group, groupId: g-enemies }
    velocity: { x: 80, y: 0 }
    conditionId: c-bounds
  a-move-left:
    id: a-move-left
    type: MoveUntil
    name: Move Left
    target: { type: group, groupId: g-enemies }
    velocity: { x: -80, y: 0 }
    conditionId: c-bounds
  a-drop-right:
    id: a-drop-right
    type: Call
    name: Drop
    callId: drop
    target: { type: group, groupId: g-enemies }
    args: { dy: 24 }
  a-drop-left:
    id: a-drop-left
    type: Call
    name: Drop
    callId: drop
    target: { type: group, groupId: g-enemies }
    args: { dy: 24 }
  a-wait-right: { id: a-wait-right, type: Wait, name: Pause, durationMs: 150 }
  a-wait-left: { id: a-wait-left, type: Wait, name: Pause, durationMs: 150 }
conditions:
  c-bounds:
    id: c-bounds
    type: BoundsHit
    bounds: { minX: 80, maxX: 944, minY: 60, maxY: 720 }
    mode: any
    scope: group-extents
    behavior: limit
