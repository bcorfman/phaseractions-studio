<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="720" viewBox="0 0 1200 720">
  <defs>
    <style>
      :root{
        --bg:#0b1020;
        --panel:#111a33;
        --panel2:#0f1730;
        --stroke:#33406a;
        --text:#e7ecff;
        --muted:#aab4e6;
        --accent:#6aa7ff;
        --accent2:#7cf0c7;
        --danger:#ff6a8f;
      }
      text{font-family: ui-sans-serif, system-ui, -apple-system, Segoe UI, Roboto, Helvetica, Arial;}
      .title{fill:var(--text); font-size:18px; font-weight:700;}
      .label{fill:var(--muted); font-size:13px;}
      .small{fill:var(--muted); font-size:12px;}
      .panel{fill:var(--panel); stroke:var(--stroke); stroke-width:1;}
      .panel2{fill:var(--panel2); stroke:var(--stroke); stroke-width:1;}
      .btn{fill:#0c1430; stroke:var(--stroke); stroke-width:1;}
      .btnText{fill:var(--text); font-size:12px; font-weight:600;}
      .btnTextMuted{fill:var(--muted); font-size:12px; font-weight:600;}
      .entity{fill:#1a254a; stroke:#2a3764; stroke-width:1;}
      .entitySelected{fill:#1a254a; stroke:var(--accent); stroke-width:2;}
      .groupHull{fill:rgba(124,240,199,0.08); stroke:var(--accent2); stroke-width:2;}
      .menu{fill:#0b1226; stroke:#3b4a7a; stroke-width:1;}
      .menuItem{fill:var(--text); font-size:12px; font-weight:600;}
      .menuHint{fill:var(--muted); font-size:11px;}
      .danger{fill:var(--danger); font-size:12px; font-weight:700;}
    </style>
  </defs>

  <rect x="0" y="0" width="1200" height="720" rx="16" fill="var(--bg)"/>

  <rect x="24" y="18" width="1152" height="54" rx="10" class="panel"/>
  <text x="44" y="50" class="title">Canvas Editor — Phase 3: Regroup / Ungroup UX</text>

  <!-- Canvas -->
  <rect x="24" y="86" width="820" height="610" rx="12" class="panel"/>
  <text x="44" y="118" class="label">Canvas</text>

  <!-- A freeform group hull (existing group) -->
  <rect x="90" y="190" width="360" height="220" rx="18" class="groupHull"/>
  <text x="110" y="216" class="small">Group: Formation A (freeform)</text>
  <rect x="140" y="250" width="66" height="44" rx="8" class="entity"/>
  <rect x="240" y="280" width="56" height="40" rx="8" class="entity"/>
  <rect x="330" y="240" width="62" height="44" rx="8" class="entity"/>
  <rect x="260" y="350" width="72" height="46" rx="8" class="entity"/>

  <!-- Multi-selected ungrouped entities -->
  <rect x="520" y="220" width="56" height="40" rx="8" class="entitySelected"/>
  <rect x="610" y="260" width="72" height="46" rx="8" class="entitySelected"/>
  <rect x="700" y="220" width="62" height="44" rx="8" class="entitySelected"/>
  <text x="520" y="206" class="small">Ungrouped selection</text>

  <!-- Context menu anchored near selection -->
  <rect x="640" y="310" width="300" height="220" rx="12" class="menu"/>
  <text x="658" y="340" class="label">Selection Actions</text>

  <text x="658" y="370" class="menuItem">Create Group from Selection</text>
  <text x="908" y="370" class="menuHint">G</text>
  <text x="658" y="398" class="menuItem">Add to Existing Group…</text>
  <text x="892" y="398" class="menuHint">⇧G</text>

  <rect x="658" y="410" width="264" height="1" fill="#2a3764"/>

  <text x="658" y="438" class="menuItem">Remove from Group</text>
  <text x="895" y="438" class="menuHint">⌥⌫</text>
  <text x="658" y="466" class="menuItem">Dissolve Group</text>
  <text x="890" y="466" class="menuHint">⇧⌥⌫</text>
  <text x="658" y="494" class="menuItem">Convert Group Layout</text>
  <text x="888" y="494" class="menuHint">L</text>

  <rect x="658" y="506" width="264" height="1" fill="#2a3764"/>

  <text x="658" y="534" class="danger">Delete Entities</text>
  <text x="892" y="534" class="menuHint">⌫</text>

  <!-- Inspector (right) -->
  <rect x="864" y="86" width="312" height="610" rx="12" class="panel"/>
  <text x="884" y="118" class="title">Inspector</text>

  <rect x="884" y="140" width="272" height="110" rx="10" class="panel2"/>
  <text x="898" y="168" class="label">Selected</text>
  <text x="898" y="194" class="small">3 entities</text>
  <rect x="898" y="206" width="122" height="28" rx="8" class="btn"/>
  <text x="912" y="225" class="btnText">Create Group</text>
  <rect x="1028" y="206" width="128" height="28" rx="8" class="btn"/>
  <text x="1042" y="225" class="btnTextMuted">Add to Group…</text>

  <rect x="884" y="270" width="272" height="140" rx="10" class="panel2"/>
  <text x="898" y="298" class="label">Grouping Rules</text>
  <text x="898" y="322" class="small">Ungrouped entities can be grouped</text>
  <text x="898" y="344" class="small">Removing updates behavior targets</text>
  <text x="898" y="366" class="small">Dissolve keeps entity positions</text>

  <rect x="884" y="432" width="272" height="106" rx="10" class="panel2"/>
  <text x="898" y="460" class="label">Focus</text>
  <text x="898" y="484" class="small">Click group hull selects group</text>
  <text x="898" y="506" class="small">Click member selects entity</text>
</svg>

