<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="720" viewBox="0 0 1200 720">
  <defs>
    <style>
      :root{
        --bg:#0b1020;
        --panel:#111a33;
        --panel2:#0f1730;
        --stroke:#33406a;
        --text:#e7ecff;
        --muted:#aab4e6;
        --accent:#6aa7ff;
        --accent2:#7cf0c7;
      }
      text{font-family: ui-sans-serif, system-ui, -apple-system, Segoe UI, Roboto, Helvetica, Arial;}
      .title{fill:var(--text); font-size:18px; font-weight:700;}
      .label{fill:var(--muted); font-size:13px;}
      .small{fill:var(--muted); font-size:12px;}
      .panel{fill:var(--panel); stroke:var(--stroke); stroke-width:1;}
      .panel2{fill:var(--panel2); stroke:var(--stroke); stroke-width:1;}
      .btn{fill:#0c1430; stroke:var(--stroke); stroke-width:1;}
      .btnPrimary{fill:rgba(106,167,255,0.18); stroke:var(--accent); stroke-width:1;}
      .btnText{fill:var(--text); font-size:12px; font-weight:700;}
      .field{fill:#0b1226; stroke:#3b4a7a; stroke-width:1;}
      .fieldText{fill:var(--text); font-size:12px; font-weight:600;}
      .divider{fill:#2a3764;}
      .groupHull{fill:rgba(124,240,199,0.08); stroke:var(--accent2); stroke-width:2;}
      .entity{fill:#1a254a; stroke:#2a3764; stroke-width:1;}
      .overlay{fill:rgba(0,0,0,0.45);}
      .radio{fill:#0b1226; stroke:#3b4a7a; stroke-width:1;}
      .radioOn{fill:rgba(106,167,255,0.22); stroke:var(--accent); stroke-width:2;}
    </style>
  </defs>

  <rect x="0" y="0" width="1200" height="720" rx="16" fill="var(--bg)"/>

  <!-- Top toolbar -->
  <rect x="24" y="18" width="1152" height="54" rx="10" class="panel"/>
  <text x="44" y="50" class="title">Canvas Editor — Phase 3: Convert Layout Modal</text>

  <!-- Canvas -->
  <rect x="24" y="86" width="1152" height="610" rx="12" class="panel"/>
  <text x="44" y="118" class="label">Canvas</text>

  <!-- Selected group -->
  <rect x="160" y="190" width="520" height="320" rx="18" class="groupHull"/>
  <text x="180" y="216" class="small">Group selected: Enemy Formation</text>
  <rect x="250" y="270" width="66" height="44" rx="8" class="entity"/>
  <rect x="360" y="310" width="56" height="40" rx="8" class="entity"/>
  <rect x="470" y="265" width="62" height="44" rx="8" class="entity"/>
  <rect x="405" y="395" width="72" height="46" rx="8" class="entity"/>

  <!-- Overlay + modal -->
  <rect x="24" y="86" width="1152" height="610" rx="12" class="overlay"/>

  <rect x="300" y="170" width="600" height="420" rx="14" class="panel"/>
  <text x="328" y="206" class="title">Convert Group Layout</text>
  <text x="328" y="232" class="small">Choose a layout type. Some layouts prompt for parameters (rows/cols, spacing).</text>

  <!-- Options list -->
  <rect x="328" y="258" width="254" height="48" rx="12" class="radioOn"/>
  <text x="348" y="288" class="btnText">Freeform</text>
  <text x="468" y="288" class="small">keep positions</text>

  <rect x="328" y="314" width="254" height="48" rx="12" class="radio"/>
  <text x="348" y="344" class="btnText">Grid</text>
  <text x="430" y="344" class="small">prompt rows/cols</text>

  <rect x="328" y="370" width="254" height="48" rx="12" class="radio"/>
  <text x="348" y="400" class="btnText">Arrange…</text>
  <text x="452" y="400" class="small">preset picker</text>

  <!-- Preview / parameters -->
  <rect x="600" y="258" width="272" height="160" rx="12" class="panel2"/>
  <text x="620" y="286" class="label">Preview</text>
  <rect x="620" y="304" width="232" height="92" rx="10" class="field"/>
  <rect x="648" y="332" width="44" height="30" rx="6" class="entity"/>
  <rect x="712" y="332" width="44" height="30" rx="6" class="entity"/>
  <rect x="776" y="332" width="44" height="30" rx="6" class="entity"/>

  <rect x="600" y="430" width="272" height="92" rx="12" class="panel2"/>
  <text x="620" y="458" class="label">Parameters</text>
  <text x="620" y="484" class="small">None (Freeform)</text>

  <rect x="328" y="532" width="544" height="1" class="divider"/>

  <!-- Buttons -->
  <rect x="620" y="548" width="118" height="32" rx="10" class="btn"/>
  <text x="658" y="570" class="btnText">Cancel</text>
  <rect x="754" y="548" width="118" height="32" rx="10" class="btnPrimary"/>
  <text x="785" y="570" class="btnText">Convert</text>
</svg>

