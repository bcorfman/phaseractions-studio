<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="720" viewBox="0 0 1200 720">
  <defs>
    <style>
      :root{
        --bg:#0b1020;
        --panel:#111a33;
        --panel2:#0f1730;
        --stroke:#33406a;
        --text:#e7ecff;
        --muted:#aab4e6;
        --accent:#6aa7ff;
        --accent2:#7cf0c7;
      }
      text{font-family: ui-sans-serif, system-ui, -apple-system, Segoe UI, Roboto, Helvetica, Arial;}
      .title{fill:var(--text); font-size:18px; font-weight:700;}
      .label{fill:var(--muted); font-size:13px;}
      .small{fill:var(--muted); font-size:12px;}
      .panel{fill:var(--panel); stroke:var(--stroke); stroke-width:1;}
      .panel2{fill:var(--panel2); stroke:var(--stroke); stroke-width:1;}
      .pill{fill:#0b1226; stroke:#3b4a7a; stroke-width:1;}
      .pillText{fill:var(--text); font-size:11px; font-weight:700;}
      .btn{fill:#0c1430; stroke:var(--stroke); stroke-width:1;}
      .btnText{fill:var(--text); font-size:12px; font-weight:700;}
      .entity{fill:#1a254a; stroke:#2a3764; stroke-width:1;}
      .groupHull{fill:rgba(124,240,199,0.08); stroke:var(--accent2); stroke-width:2;}
      .menu{fill:#0b1226; stroke:#3b4a7a; stroke-width:1;}
      .menuItem{fill:var(--text); font-size:12px; font-weight:600;}
      .menuHint{fill:var(--muted); font-size:11px;}
      .hover{fill:rgba(106,167,255,0.12); stroke:rgba(106,167,255,0.0); stroke-width:1;}
      .field{fill:#0b1226; stroke:#3b4a7a; stroke-width:1;}
      .divider{fill:#2a3764;}
    </style>
  </defs>

  <rect x="0" y="0" width="1200" height="720" rx="16" fill="var(--bg)"/>

  <rect x="24" y="18" width="1152" height="54" rx="10" class="panel"/>
  <text x="44" y="50" class="title">Canvas Editor — Phase 3: Convert Layout Popover Panel</text>

  <!-- Canvas -->
  <rect x="24" y="86" width="1152" height="610" rx="12" class="panel"/>
  <text x="44" y="118" class="label">Canvas</text>

  <!-- Selected group -->
  <rect x="150" y="210" width="420" height="260" rx="18" class="groupHull"/>
  <text x="170" y="236" class="small">Group selected: Enemy Formation</text>
  <rect x="220" y="280" width="66" height="44" rx="8" class="entity"/>
  <rect x="320" y="310" width="56" height="40" rx="8" class="entity"/>
  <rect x="420" y="270" width="62" height="44" rx="8" class="entity"/>
  <rect x="355" y="390" width="72" height="46" rx="8" class="entity"/>

  <!-- Top-right selection actions -->
  <rect x="780" y="110" width="376" height="52" rx="14" class="pill"/>
  <text x="798" y="142" class="pillText">Selection</text>
  <rect x="870" y="122" width="164" height="28" rx="10" class="btn"/>
  <text x="888" y="141" class="btnText">Convert Layout…</text>
  <rect x="1042" y="122" width="96" height="28" rx="10" class="btn"/>
  <text x="1062" y="141" class="btnText">More…</text>

  <!-- Popover panel (replaces nested submenu) -->
  <rect x="812" y="164" width="344" height="282" rx="14" class="menu"/>
  <text x="832" y="194" class="label">Convert Layout</text>

  <!-- Search -->
  <rect x="832" y="206" width="304" height="30" rx="10" class="field"/>
  <text x="846" y="226" class="menuHint">Search layouts…</text>
  <rect x="832" y="248" width="304" height="1" class="divider"/>

  <rect x="824" y="258" width="328" height="28" rx="10" class="hover"/>
  <text x="832" y="278" class="menuItem">Freeform</text>
  <text x="1056" y="278" class="menuHint">keeps positions</text>
  <text x="832" y="306" class="menuItem">Grid</text>
  <text x="1062" y="306" class="menuHint">rows/cols</text>
  <text x="832" y="334" class="menuItem">Arrange…</text>
  <text x="1064" y="334" class="menuHint">presets</text>

  <rect x="832" y="350" width="304" height="1" class="divider"/>
  <text x="832" y="378" class="menuItem">Layout Inspector…</text>
  <text x="1056" y="378" class="menuHint">Enter</text>

  <!-- Note -->
  <rect x="812" y="460" width="344" height="92" rx="14" class="panel2"/>
  <text x="832" y="490" class="label">Why this works</text>
  <text x="832" y="512" class="small">A popover can auto‑flip/resize to stay on‑screen</text>
  <text x="832" y="532" class="small">and uses only vertical scrolling (no horizontal bars).</text>
</svg>

