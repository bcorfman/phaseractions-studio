<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="720" viewBox="0 0 1200 720">
  <defs>
    <style>
      :root{
        --bg:#0b1020;
        --panel:#111a33;
        --panel2:#0f1730;
        --stroke:#33406a;
        --text:#e7ecff;
        --muted:#aab4e6;
        --accent:#6aa7ff;
        --accent2:#7cf0c7;
        --warn:#ffb86a;
      }
      text{font-family: ui-sans-serif, system-ui, -apple-system, Segoe UI, Roboto, Helvetica, Arial; }
      .title{fill:var(--text); font-size:18px; font-weight:700;}
      .label{fill:var(--muted); font-size:13px;}
      .small{fill:var(--muted); font-size:12px;}
      .panel{fill:var(--panel); stroke:var(--stroke); stroke-width:1;}
      .panel2{fill:var(--panel2); stroke:var(--stroke); stroke-width:1;}
      .chip{fill:#0c1430; stroke:var(--stroke); stroke-width:1;}
      .btn{fill:#0c1430; stroke:var(--stroke); stroke-width:1;}
      .btnText{fill:var(--text); font-size:12px; font-weight:600;}
      .btnTextMuted{fill:var(--muted); font-size:12px; font-weight:600;}
      .entity{fill:#1a254a; stroke:#2a3764; stroke-width:1;}
      .entitySelected{fill:#1a254a; stroke:var(--accent); stroke-width:2;}
      .entityHover{fill:#1a254a; stroke:var(--accent2); stroke-width:2; stroke-dasharray:6 4;}
      .marquee{fill:rgba(106,167,255,0.14); stroke:var(--accent); stroke-width:2; stroke-dasharray:6 4;}
      .hint{fill:#0c1430; stroke:var(--stroke); stroke-width:1;}
      .kbd{fill:#0b1226; stroke:#3b4a7a; stroke-width:1;}
      .kbdText{fill:var(--text); font-size:11px; font-weight:700;}
    </style>
  </defs>

  <!-- Background -->
  <rect x="0" y="0" width="1200" height="720" rx="16" fill="var(--bg)"/>

  <!-- Top toolbar -->
  <rect x="24" y="18" width="1152" height="54" rx="10" class="panel"/>
  <text x="44" y="50" class="title">Canvas Editor — Phase 3: Marquee Multi‑Select</text>
  <rect x="830" y="30" width="86" height="30" rx="8" class="btn"/>
  <text x="848" y="50" class="btnText">Undo</text>
  <rect x="924" y="30" width="86" height="30" rx="8" class="btn"/>
  <text x="944" y="50" class="btnText">Redo</text>
  <rect x="1018" y="30" width="118" height="30" rx="8" class="btn"/>
  <text x="1034" y="50" class="btnTextMuted">Play Mode</text>
  <rect x="1126" y="30" width="38" height="30" rx="8" class="btn"/>
  <text x="1139" y="50" class="btnText">⛭</text>

  <!-- Left inspector -->
  <rect x="24" y="86" width="310" height="610" rx="12" class="panel"/>
  <text x="44" y="118" class="title">Inspector</text>
  <text x="44" y="146" class="label">Selection</text>
  <rect x="44" y="158" width="270" height="86" rx="10" class="panel2"/>
  <text x="58" y="186" class="label">3 entities selected</text>
  <text x="58" y="210" class="small">Shift: add/remove • Drag: move selection</text>
  <rect x="44" y="262" width="270" height="36" rx="10" class="btn"/>
  <text x="58" y="285" class="btnText">Create Group</text>
  <rect x="184" y="262" width="130" height="36" rx="10" class="btn"/>
  <text x="198" y="285" class="btnTextMuted">Dissolve</text>

  <text x="44" y="334" class="label">Snapping</text>
  <rect x="44" y="346" width="270" height="44" rx="10" class="panel2"/>
  <rect x="58" y="358" width="86" height="22" rx="11" class="chip"/>
  <text x="72" y="374" class="small">Grid</text>
  <rect x="150" y="358" width="64" height="22" rx="11" class="chip"/>
  <text x="164" y="374" class="small">8px</text>
  <rect x="220" y="358" width="80" height="22" rx="11" class="chip"/>
  <text x="234" y="374" class="small">On</text>

  <text x="44" y="430" class="label">Pinned Panel</text>
  <rect x="44" y="442" width="270" height="54" rx="10" class="panel2"/>
  <text x="58" y="468" class="small">Pin keeps details visible while dragging</text>
  <rect x="250" y="452" width="50" height="30" rx="8" class="btn"/>
  <text x="264" y="472" class="btnText">Pin</text>

  <!-- Canvas area -->
  <rect x="354" y="86" width="822" height="610" rx="12" class="panel"/>
  <text x="374" y="118" class="label">Canvas</text>

  <!-- Entities on canvas -->
  <rect x="410" y="170" width="64" height="44" rx="8" class="entity"/>
  <rect x="520" y="210" width="56" height="40" rx="8" class="entitySelected"/>
  <rect x="610" y="260" width="72" height="46" rx="8" class="entitySelected"/>
  <rect x="700" y="220" width="62" height="44" rx="8" class="entitySelected"/>
  <rect x="820" y="180" width="56" height="40" rx="8" class="entity"/>
  <rect x="900" y="270" width="66" height="46" rx="8" class="entityHover"/>
  <rect x="780" y="330" width="74" height="50" rx="8" class="entity"/>
  <rect x="650" y="370" width="58" height="44" rx="8" class="entity"/>

  <!-- Marquee selection -->
  <rect x="500" y="190" width="300" height="140" rx="10" class="marquee"/>
  <text x="508" y="184" class="small">Marquee selects entities</text>

  <!-- Floating selection toolbar -->
  <rect x="610" y="430" width="390" height="46" rx="12" class="hint"/>
  <text x="626" y="458" class="btnText">3 selected</text>
  <rect x="720" y="440" width="100" height="26" rx="8" class="btn"/>
  <text x="738" y="458" class="btnText">Group</text>
  <rect x="828" y="440" width="112" height="26" rx="8" class="btn"/>
  <text x="844" y="458" class="btnTextMuted">Ungroup</text>
  <rect x="948" y="440" width="40" height="26" rx="8" class="btn"/>
  <text x="962" y="458" class="btnText">⋯</text>

  <!-- Keyboard hint -->
  <rect x="374" y="640" width="418" height="36" rx="10" class="hint"/>
  <rect x="388" y="648" width="40" height="20" rx="6" class="kbd"/>
  <text x="401" y="663" class="kbdText">⌘</text>
  <rect x="434" y="648" width="40" height="20" rx="6" class="kbd"/>
  <text x="448" y="663" class="kbdText">Z</text>
  <text x="482" y="663" class="small">Undo drag as one step • Arrow keys nudge • Shift + Arrow = 10px</text>

  <!-- Callouts -->
  <rect x="910" y="560" width="242" height="92" rx="12" class="panel2"/>
  <text x="926" y="588" class="label">Notes</text>
  <text x="926" y="612" class="small">Marquee ignores groups by default</text>
  <text x="926" y="634" class="small">Alt: constrain marquee to axis</text>
</svg>

