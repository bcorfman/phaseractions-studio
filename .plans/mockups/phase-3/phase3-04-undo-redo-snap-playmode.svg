<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="720" viewBox="0 0 1200 720">
  <defs>
    <style>
      :root{
        --bg:#0b1020;
        --panel:#111a33;
        --panel2:#0f1730;
        --stroke:#33406a;
        --text:#e7ecff;
        --muted:#aab4e6;
        --accent:#6aa7ff;
        --accent2:#7cf0c7;
      }
      text{font-family: ui-sans-serif, system-ui, -apple-system, Segoe UI, Roboto, Helvetica, Arial;}
      .title{fill:var(--text); font-size:18px; font-weight:700;}
      .label{fill:var(--muted); font-size:13px;}
      .small{fill:var(--muted); font-size:12px;}
      .panel{fill:var(--panel); stroke:var(--stroke); stroke-width:1;}
      .panel2{fill:var(--panel2); stroke:var(--stroke); stroke-width:1;}
      .btn{fill:#0c1430; stroke:var(--stroke); stroke-width:1;}
      .btnText{fill:var(--text); font-size:12px; font-weight:600;}
      .chip{fill:#0c1430; stroke:var(--stroke); stroke-width:1;}
      .grid{stroke:rgba(106,167,255,0.22); stroke-width:1;}
      .entity{fill:#1a254a; stroke:#2a3764; stroke-width:1;}
      .entitySelected{fill:#1a254a; stroke:var(--accent2); stroke-width:2;}
      .dragLabel{fill:#0b1226; stroke:#3b4a7a; stroke-width:1;}
    </style>
  </defs>

  <rect x="0" y="0" width="1200" height="720" rx="16" fill="var(--bg)"/>

  <!-- Top toolbar -->
  <rect x="24" y="18" width="1152" height="54" rx="10" class="panel"/>
  <text x="44" y="50" class="title">Canvas Editor — Phase 3: Undo/Redo + Snap + Play/Edit + Pin</text>

  <rect x="720" y="30" width="86" height="30" rx="8" class="btn"/>
  <text x="740" y="50" class="btnText">Undo</text>
  <rect x="812" y="30" width="86" height="30" rx="8" class="btn"/>
  <text x="834" y="50" class="btnText">Redo</text>
  <rect x="904" y="30" width="140" height="30" rx="8" class="btn"/>
  <text x="918" y="50" class="btnText">Snap: 8px</text>
  <rect x="1048" y="30" width="116" height="30" rx="8" class="btn"/>
  <text x="1064" y="50" class="btnText">Edit Mode</text>

  <!-- Left: pinned inspector panel (floating) -->
  <rect x="60" y="120" width="320" height="190" rx="12" class="panel2"/>
  <text x="80" y="150" class="label">Pinned — Entity</text>
  <text x="80" y="176" class="small">id: enemy_07</text>
  <text x="80" y="200" class="small">x: 512  y: 288</text>
  <text x="80" y="224" class="small">Δx: +16  Δy: +0</text>
  <rect x="250" y="134" width="110" height="28" rx="8" class="btn"/>
  <text x="264" y="154" class="btnText">Unpin</text>

  <!-- Canvas -->
  <rect x="24" y="86" width="1152" height="610" rx="12" class="panel"/>
  <text x="44" y="118" class="label">Canvas</text>

  <!-- Grid overlay (optional) -->
  <g opacity="0.9">
    <!-- vertical lines -->
    <line x1="104" y1="150" x2="104" y2="676" class="grid"/>
    <line x1="184" y1="150" x2="184" y2="676" class="grid"/>
    <line x1="264" y1="150" x2="264" y2="676" class="grid"/>
    <line x1="344" y1="150" x2="344" y2="676" class="grid"/>
    <line x1="424" y1="150" x2="424" y2="676" class="grid"/>
    <line x1="504" y1="150" x2="504" y2="676" class="grid"/>
    <line x1="584" y1="150" x2="584" y2="676" class="grid"/>
    <line x1="664" y1="150" x2="664" y2="676" class="grid"/>
    <line x1="744" y1="150" x2="744" y2="676" class="grid"/>
    <line x1="824" y1="150" x2="824" y2="676" class="grid"/>
    <line x1="904" y1="150" x2="904" y2="676" class="grid"/>
    <line x1="984" y1="150" x2="984" y2="676" class="grid"/>
    <line x1="1064" y1="150" x2="1064" y2="676" class="grid"/>
    <!-- horizontal lines -->
    <line x1="44" y1="166" x2="1156" y2="166" class="grid"/>
    <line x1="44" y1="246" x2="1156" y2="246" class="grid"/>
    <line x1="44" y1="326" x2="1156" y2="326" class="grid"/>
    <line x1="44" y1="406" x2="1156" y2="406" class="grid"/>
    <line x1="44" y1="486" x2="1156" y2="486" class="grid"/>
    <line x1="44" y1="566" x2="1156" y2="566" class="grid"/>
    <line x1="44" y1="646" x2="1156" y2="646" class="grid"/>
  </g>

  <!-- Entities -->
  <rect x="488" y="278" width="56" height="40" rx="8" class="entitySelected"/>
  <rect x="640" y="278" width="56" height="40" rx="8" class="entity"/>
  <rect x="768" y="358" width="62" height="44" rx="8" class="entity"/>
  <rect x="912" y="238" width="56" height="40" rx="8" class="entity"/>

  <!-- Drag delta label -->
  <rect x="540" y="238" width="152" height="30" rx="10" class="dragLabel"/>
  <text x="554" y="258" class="btnText">Snapped: +16px</text>

  <!-- History note -->
  <rect x="860" y="610" width="296" height="66" rx="12" class="panel2"/>
  <text x="876" y="636" class="label">History</text>
  <text x="876" y="658" class="small">Pointer drag collapses into one undo step</text>
</svg>

