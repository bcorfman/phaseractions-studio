<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="720" viewBox="0 0 1200 720">
  <defs>
    <style>
      :root{
        --bg:#0b1020;
        --panel:#111a33;
        --stroke:#33406a;
        --text:#e7ecff;
        --muted:#aab4e6;
        --accent:#6aa7ff;
        --accent2:#7cf0c7;
      }
      text{font-family: ui-sans-serif, system-ui, -apple-system, Segoe UI, Roboto, Helvetica, Arial;}
      .title{fill:var(--text); font-size:18px; font-weight:700;}
      .label{fill:var(--muted); font-size:13px;}
      .small{fill:var(--muted); font-size:12px;}
      .panel{fill:var(--panel); stroke:var(--stroke); stroke-width:1;}
      .menu{fill:#0b1226; stroke:#3b4a7a; stroke-width:1;}
      .menuItem{fill:var(--text); font-size:12px; font-weight:600;}
      .menuHint{fill:var(--muted); font-size:11px;}
      .divider{fill:#2a3764;}
      .hover{fill:rgba(106,167,255,0.12); stroke:rgba(106,167,255,0.0); stroke-width:1;}
      .groupHull{fill:rgba(124,240,199,0.08); stroke:var(--accent2); stroke-width:2;}
      .entity{fill:#1a254a; stroke:#2a3764; stroke-width:1;}
    </style>
  </defs>

  <rect x="0" y="0" width="1200" height="720" rx="16" fill="var(--bg)"/>

  <rect x="24" y="18" width="1152" height="54" rx="10" class="panel"/>
  <text x="44" y="50" class="title">Canvas Editor — Phase 3: Convert Group Layout Submenu</text>

  <!-- Canvas -->
  <rect x="24" y="86" width="820" height="610" rx="12" class="panel"/>
  <text x="44" y="118" class="label">Canvas</text>

  <!-- Selected group -->
  <rect x="140" y="210" width="420" height="260" rx="18" class="groupHull"/>
  <text x="160" y="236" class="small">Group selected: Enemy Formation</text>
  <rect x="210" y="280" width="66" height="44" rx="8" class="entity"/>
  <rect x="310" y="310" width="56" height="40" rx="8" class="entity"/>
  <rect x="410" y="270" width="62" height="44" rx="8" class="entity"/>
  <rect x="345" y="390" width="72" height="46" rx="8" class="entity"/>

  <!-- Main menu -->
  <rect x="560" y="260" width="320" height="240" rx="12" class="menu"/>
  <text x="578" y="290" class="label">Selection Actions</text>

  <text x="578" y="322" class="menuItem">Remove from Group</text>
  <text x="820" y="322" class="menuHint">⌥⌫</text>
  <text x="578" y="350" class="menuItem">Dissolve Group</text>
  <text x="816" y="350" class="menuHint">⇧⌥⌫</text>

  <rect x="578" y="364" width="284" height="1" class="divider"/>

  <rect x="570" y="374" width="304" height="28" rx="10" class="hover"/>
  <text x="578" y="394" class="menuItem">Convert Group Layout ▸</text>
  <text x="828" y="394" class="menuHint">L</text>

  <rect x="578" y="410" width="284" height="1" class="divider"/>
  <text x="578" y="438" class="menuItem">Open Layout Inspector…</text>
  <text x="812" y="438" class="menuHint">Enter</text>

  <!-- Submenu -->
  <rect x="880" y="350" width="260" height="182" rx="12" class="menu"/>
  <text x="898" y="380" class="label">Convert Layout</text>

  <text x="898" y="412" class="menuItem">Freeform</text>
  <text x="1080" y="412" class="menuHint">keeps positions</text>
  <text x="898" y="440" class="menuItem">Grid</text>
  <text x="1042" y="440" class="menuHint">prompt rows/cols</text>
  <text x="898" y="468" class="menuItem">Arrange…</text>
  <text x="1052" y="468" class="menuHint">preset picker</text>
</svg>

