<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="720" viewBox="0 0 1200 720">
  <defs>
    <style>
      :root{
        --bg:#0b1020;
        --panel:#111a33;
        --panel2:#0f1730;
        --stroke:#33406a;
        --text:#e7ecff;
        --muted:#aab4e6;
        --accent:#6aa7ff;
        --accent2:#7cf0c7;
      }
      text{font-family: ui-sans-serif, system-ui, -apple-system, Segoe UI, Roboto, Helvetica, Arial;}
      .title{fill:var(--text); font-size:18px; font-weight:700;}
      .label{fill:var(--muted); font-size:13px;}
      .small{fill:var(--muted); font-size:12px;}
      .panel{fill:var(--panel); stroke:var(--stroke); stroke-width:1;}
      .panel2{fill:var(--panel2); stroke:var(--stroke); stroke-width:1;}
      .overlay{fill:rgba(0,0,0,0.45);}
      .field{fill:#0b1226; stroke:#3b4a7a; stroke-width:1;}
      .menu{fill:#0b1226; stroke:#3b4a7a; stroke-width:1;}
      .menuItem{fill:var(--text); font-size:12px; font-weight:700;}
      .menuHint{fill:var(--muted); font-size:11px;}
      .hover{fill:rgba(106,167,255,0.12); stroke:rgba(106,167,255,0.0); stroke-width:1;}
      .divider{fill:#2a3764;}
      .groupHull{fill:rgba(124,240,199,0.08); stroke:var(--accent2); stroke-width:2;}
      .entity{fill:#1a254a; stroke:#2a3764; stroke-width:1;}
      .kbd{fill:#0b1226; stroke:#3b4a7a; stroke-width:1;}
      .kbdText{fill:var(--text); font-size:11px; font-weight:800;}
    </style>
  </defs>

  <rect x="0" y="0" width="1200" height="720" rx="16" fill="var(--bg)"/>

  <rect x="24" y="18" width="1152" height="54" rx="10" class="panel"/>
  <text x="44" y="50" class="title">Canvas Editor — Phase 3: Convert Layout via Command Palette</text>

  <!-- Canvas -->
  <rect x="24" y="86" width="1152" height="610" rx="12" class="panel"/>
  <text x="44" y="118" class="label">Canvas</text>

  <!-- Selected group -->
  <rect x="160" y="210" width="420" height="260" rx="18" class="groupHull"/>
  <text x="180" y="236" class="small">Group selected: Enemy Formation</text>
  <rect x="230" y="280" width="66" height="44" rx="8" class="entity"/>
  <rect x="330" y="310" width="56" height="40" rx="8" class="entity"/>
  <rect x="430" y="270" width="62" height="44" rx="8" class="entity"/>
  <rect x="365" y="390" width="72" height="46" rx="8" class="entity"/>

  <!-- Overlay -->
  <rect x="24" y="86" width="1152" height="610" rx="12" class="overlay"/>

  <!-- Command palette -->
  <rect x="300" y="160" width="600" height="356" rx="14" class="menu"/>
  <text x="328" y="194" class="label">Command Palette</text>

  <rect x="328" y="208" width="544" height="36" rx="10" class="field"/>
  <text x="344" y="231" class="menuItem">convert layout</text>
  <rect x="328" y="258" width="544" height="1" class="divider"/>

  <rect x="320" y="270" width="576" height="32" rx="10" class="hover"/>
  <text x="328" y="292" class="menuItem">Convert Group Layout: Freeform</text>
  <text x="816" y="292" class="menuHint">Enter</text>

  <text x="328" y="324" class="menuItem">Convert Group Layout: Grid…</text>
  <text x="816" y="324" class="menuHint">prompts rows/cols</text>

  <text x="328" y="356" class="menuItem">Convert Group Layout: Arrange…</text>
  <text x="816" y="356" class="menuHint">preset picker</text>

  <rect x="328" y="372" width="544" height="1" class="divider"/>
  <text x="328" y="404" class="menuItem">Open Layout Inspector</text>
  <text x="816" y="404" class="menuHint">⇧ Enter</text>

  <!-- Shortcut hint -->
  <rect x="300" y="532" width="600" height="62" rx="14" class="panel2"/>
  <text x="328" y="562" class="label">Hint</text>
  <rect x="380" y="546" width="76" height="28" rx="8" class="kbd"/>
  <text x="398" y="566" class="kbdText">Ctrl/⌘K</text>
  <text x="470" y="565" class="small">Open palette (works even when menus would clip).</text>
</svg>

